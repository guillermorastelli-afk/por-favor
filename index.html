<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Contador de Frutas</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #hud {
            position: absolute;
            top: 15px;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 10px;
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .counter {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        video, canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="counter" style="color: #FFD700;">🍋 Limones: <span id="limones">0</span></div>
        <div class="counter" style="color: #FF8C00;">🍊 Naranjas: <span id="naranjas">0</span></div>
    </div>

    <div id="canvas-container">
        <video id="webcam" autoplay playsinline muted style="display:none;"></video>
        <canvas id="canvas"></canvas>
    </div>

    <!-- Ahora cargamos la librería directamente de forma local -->
    <script src="run-impulse.js"></script>
    
    <!-- Tu archivo del modelo generado -->
    <script src="edge-impulse-standalone.js"></script> 
    
    <!-- Tu lógica de la aplicación -->
    <script src="app.js"></script>
</body>
</html>
